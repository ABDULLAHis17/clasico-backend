
services:
  db:
    image: mysql:8.0
    container_name: clasico_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-clasico_db}
      MYSQL_USER: ${MYSQL_USER:-clasico_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-clasicopass}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

  api:
    build: .
    container_name: clasico_api
    restart: always
    ports:
      - "8001:8000"
    environment:
      - DATABASE_URL=mysql+pymysql://${MYSQL_USER:-clasico_user}:${MYSQL_PASSWORD:-clasicopass}@db:3306/${MYSQL_DATABASE:-clasico_db}
    depends_on:
      - db
    volumes:
      - .:/app

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: clasico_phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
    depends_on:
      - db

volumes:
  db_data:
