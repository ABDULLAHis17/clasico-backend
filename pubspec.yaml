name: classico
description: "Classico - Football App"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.20.2
  url_launcher: ^6.3.1
  google_fonts: ^6.1.0
  google_generative_ai: ^0.4.0
  shared_preferences: ^2.2.2
  connectivity_plus: ^5.0.2
  path_provider: ^2.1.2
  http: ^1.2.0
  speech_to_text: ^7.0.0
  permission_handler: ^11.3.0
  confetti: ^0.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/logo1.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/images/dataset/
